  <style>
    html, body { scrollbar-width: none; }
    *::-webkit-scrollbar { width: 0; height: 0; display: none; }
    main > section:first-child { margin-top: 0; }

    .page-title { margin: 0; text-align: center; font-size: 34px; }
    .page-subtitle {
      margin: 10px auto 0;
      max-width: 760px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .tools { display: grid; gap: 10px; margin-top: 8px; }
    .tab-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .tab-btn {
      border: 1px solid #2b2f48;
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: .2s ease;
      min-height: 42px;
    }
    .tab-btn.active {
      border-color: var(--accent);
      background: rgba(59,130,246,.16);
      box-shadow: 0 0 0 1px rgba(59,130,246,.14) inset;
    }

    .subtools {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    #search-input, #category-filter {
      width: 100%;
      max-width: 340px;
      margin: 0;
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2b2f48;
      background: #171a2b;
      color: #e5e7eb;
    }

    #search-input:focus, #category-filter:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59,130,246,.15);
    }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }
    .switch input {
      accent-color: #3b82f6;
      width: 16px;
      height: 16px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-chip {
      border: 1px solid #2b2f48;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      color: var(--muted);
      background: #131727;
    }

    .mini-btn {
      border: 1px solid #2b2f48;
      background: #151a2d;
      color: var(--text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      min-height: 30px;
    }

    .notice {
      border: 1px solid #2b2f48;
      border-radius: 12px;
      background: rgba(245,158,11,.08);
      color: #fcd34d;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .feed { margin-top: 14px; display: grid; gap: 10px; }

    .skeleton-row {
      height: 102px;
      border: 1px solid #24263a;
      border-radius: 14px;
      background: linear-gradient(90deg, #171a2b 25%, #1e2338 50%, #171a2b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    .status-group {
      margin-top: 6px;
      border: 1px solid #24263a;
      border-radius: 14px;
      overflow: hidden;
      background: #121628;
      animation: fadeIn .25s ease;
    }

    .status-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid #24263a;
      letter-spacing: .2px;
    }

    .status-head .count {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    .status-epul .status-head { color: #fcd34d; background: rgba(180, 83, 9, .12); }
    .status-tervezett .status-head { color: #c4b5fd; background: rgba(109, 40, 217, .12); }
    .status-kesz .status-head { color: #86efac; background: rgba(22, 163, 74, .12); }

    .list-item {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #202438;
      padding: 10px;
      opacity: 0;
      transform: translateY(8px);
      animation: listIn .35s ease forwards;
      transition: background .2s ease, transform .2s ease;
      position: relative;
    }

    .list-item:first-of-type { border-top: none; }
    .list-item:hover { background: rgba(255,255,255,.02); transform: translateY(-1px); }

    .list-item.status-kesz-row::before,
    .list-item.status-epul-row::before,
    .list-item.status-tervezett-row::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 2px;
    }

    .list-item.status-kesz-row::before { background: #16a34a; }
    .list-item.status-epul-row::before { background: #f59e0b; }
    .list-item.status-tervezett-row::before { background: #8b5cf6; }

    .feed.few-items .list-item {
      grid-template-columns: 210px 1fr auto;
      min-height: 148px;
      padding: 16px;
    }

    .feed.single-item .list-item {
      grid-template-columns: 250px 1fr auto;
      min-height: 184px;
      padding: 18px;
    }

    .mini-image {
      width: 100%;
      height: 96px;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
      border: 1px solid #2b2f48;
      background: #101427;
    }

    .feed.few-items .mini-image { height: 120px; }
    .feed.single-item .mini-image { height: 156px; }

    .mini-image.fit-contain {
      object-fit: contain;
      padding: 8px;
      background: #0f1220;
    }

    .mini-image.is-logo {
      object-fit: contain;
      padding: 10px;
      background: #0f1220;
    }

    .item-title { margin: 0 0 4px; font-size: 18px; line-height: 1.2; }
    .item-meta { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }

    .chips { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }

    .chip {
      border: 1px solid #2b2f48;
      border-radius: 999px;
      background: #131727;
      color: var(--muted);
      font-size: 11px;
      padding: 4px 8px;
    }

    .chip.kesz { color: #86efac; border-color: rgba(22,163,74,.35); background: rgba(22,163,74,.14); }
    .chip.epul { color: #fcd34d; border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.14); }
    .chip.tervezett { color: #c4b5fd; border-color: rgba(139,92,246,.35); background: rgba(139,92,246,.14); }

    mark {
      background: rgba(59,130,246,.25);
      color: #dbeafe;
      border-radius: 4px;
      padding: 0 2px;
    }

    .open-btn {
      border: 1px solid #2b2f48;
      background: #151a2d;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      min-width: 88px;
      white-space: nowrap;
      font-weight: 600;
      transition: .2s ease;
      min-height: 42px;
    }
    .open-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 20px rgba(59,130,246,.22);
    }

    .state-box {
      border: 1px solid #2b2f48;
      border-radius: 14px;
      background: #121628;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    .state-box h3 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 18px;
    }

    .load-more-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .load-more-btn {
      border: 1px solid #2b2f48;
      background: #151a2d;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      min-height: 42px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      padding: 16px;
      background: rgba(10,12,20,.86);
      backdrop-filter: blur(6px);
    }

    .modal.active {
      display: grid;
      place-items: center;
      animation: fadeIn .25s ease;
    }

    .panel {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      background: #121628;
      border: 1px solid #2b2f48;
      border-radius: 16px;
      padding: 14px;
      transform: translateY(8px);
      animation: panelIn .28s ease forwards;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-title { margin: 0 0 5px; font-size: 30px; line-height: 1.15; }
    .panel-meta { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.45; }

    .panel-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .close-panel, .share-btn {
      width: 42px;
      height: 42px;
      border: 1px solid #2b2f48;
      border-radius: 10px;
      background: #181d31;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .panel-desc { margin: 0 0 14px; line-height: 1.7; }

    .progress-wrap { margin-bottom: 12px; }
    .progress-text { color: var(--muted); font-size: 13px; margin-bottom: 6px; }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #2b2f48;
      overflow: hidden;
      background: #101427;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #3b82f6, #16a34a);
      animation: glowBar 2.2s ease-in-out infinite;
    }

    .gallery-main-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2b2f48;
      background: #0c0f1a;
      touch-action: pan-y;
      cursor: zoom-in;
    }

    .gallery-main {
      width: 100%;
      height: clamp(210px, 42vw, 500px);
      object-fit: cover;
      display: block;
      animation: imageIn .25s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .gallery-nav {
      position: absolute;
      inset: auto 8px 8px auto;
      display: flex;
      gap: 6px;
    }

    .gallery-btn {
      width: 40px;
      height: 40px;
      border-radius: 9px;
      border: 1px solid #2b2f48;
      background: rgba(15,18,32,.88);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    .thumbs {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
    }

    .thumb {
      border: 1px solid #2b2f48;
      border-radius: 8px;
      overflow: hidden;
      background: #101427;
      padding: 0;
      cursor: pointer;
      min-height: 72px;
    }

    .thumb img {
      width: 100%;
      height: 68px;
      object-fit: cover;
      display: block;
      opacity: .72;
      transition: opacity .2s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .thumb.active { border-color: var(--accent); }
    .thumb.active img, .thumb:hover img { opacity: 1; }

    .swipe-hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    details.history {
      margin-top: 12px;
      border-top: 1px solid #2b2f48;
      padding-top: 10px;
    }

    details.history summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      min-height: 40px;
    }

    details.history summary::-webkit-details-marker { display: none; }
    details.history summary::after { content: "+"; font-size: 18px; color: var(--muted); }
    details.history[open] summary::after { content: "-"; }

    .history-list {
      margin: 6px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 7px;
      animation: fadeIn .2s ease;
    }

    .history-list li {
      border-left: 2px solid #2b2f48;
      padding-left: 10px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    .history-list strong { color: var(--text); }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      place-items: center;
      background: rgba(5,7,14,.95);
      padding: 14px;
    }

    .lightbox.active { display: grid; }

    .lightbox img {
      max-width: min(1400px, 100%);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #2b2f48;
    }

    .lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border: 1px solid #2b2f48;
      border-radius: 10px;
      background: #181d31;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes listIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes panelIn { to { transform: translateY(0); } }
    @keyframes imageIn { from { transform: scale(1.02); opacity: .9; } to { transform: scale(1); opacity: 1; } }
    @keyframes glowBar { 0% { filter: brightness(.9); } 50% { filter: brightness(1.2); } 100% { filter: brightness(.9); } }

    @media (max-width: 900px) {
      #search-input, #category-filter { max-width: 100%; }
      .subtools { align-items: stretch; }
      .filter-row { flex-direction: column; align-items: stretch; }
    }

    @media (max-width: 768px) {
      .container { padding: 12px; }

      .hero { padding: 18px 12px; }
      .page-title { font-size: 24px; }
      .page-subtitle { font-size: 13px; }

      .tab-row { display: grid; grid-template-columns: 1fr 1fr; }
      .tab-btn { width: 100%; font-size: 13px; }

      .subtools { flex-direction: column; align-items: stretch; }
      .switch { justify-content: flex-end; }

      .list-item,
      .feed.few-items .list-item,
      .feed.single-item .list-item {
        grid-template-columns: 1fr;
        align-items: start;
        min-height: unset;
      }

      .mini-image,
      .feed.few-items .mini-image,
      .feed.single-item .mini-image { height: 164px; }

      .open-btn { width: 100%; }

      .modal {
        padding: 0;
        align-items: end;
      }

      .panel {
        width: 100%;
        max-height: 100dvh;
        min-height: 90dvh;
        border-radius: 14px 14px 0 0;
        border-bottom: none;
        padding: 12px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .panel-title { font-size: 22px; }
      .panel-meta { font-size: 13px; }

      .gallery-main { height: 230px; }
      .gallery-btn { width: 42px; height: 42px; }

      .thumbs {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
      }

      .thumb {
        flex: 0 0 92px;
        scroll-snap-align: start;
      }

      .swipe-hint {
        text-align: center;
        font-size: 11px;
      }
    }

    @media (max-width: 420px) {
      .page-title { font-size: 22px; }
      .item-title { font-size: 17px; }
      .gallery-main { height: 200px; }
      .chips { gap: 5px; }
      .chip { font-size: 10px; padding: 3px 7px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

          { date: "2026-05-28", text: "Terület kijelölése és terv jóváhagyás." },
          { date: "2026-06-03", text: "A lapozási és burkolat-előkészítési munkák elindultak." },
          { date: "2026-06-10", text: "Első felfestések és lámpahelyek kialakítása." }
        ]
      },
      {
        id: "hamburg-allomas",
        type: "projekt",
        status: "kesz",
        category: "Közlekedés",
        title: "Hamburgi vasúti állomás modernizáció",
        date: "2026-06-05",
        author: "Nagy Máté",
        investor: "DB (Deutsche Bahn)",
        progress: 100,
        short: "Állomási közlekedés és peronkapcsolat fejlesztés.",
        description: "Az állomás környezete megújult, átláthatóbb gyalogos kapcsolatokkal és jobb közlekedési ritmussal.",
        images: [
          "images/beruhazas/hamburg-db-1.png",
          "images/beruhazas/hamburg-db-2.png"
        ],
        history: [
          { date: "2026-05-18", text: "Forgalmi modellezés és szükséglista lezárva." },
          { date: "2026-05-27", text: "Peron melletti burkolati munkák és jelzések cseréje." },
          { date: "2026-06-05", text: "Projekt átadva, forgalomba helyezve." }
        ]
      }
    ];

    const feedEl = document.getElementById("feed");
    const searchEl = document.getElementById("search-input");
    const emptyEl = document.getElementById("emptyState");
    const tabs = document.querySelectorAll(".tab-btn");
    const modal = document.getElementById("detailModal");
    const detailPanel = document.getElementById("detailPanel");
    const statsBar = document.getElementById("statsBar");
    const activeOnly = document.getElementById("activeOnly");
    const activeOnlyWrap = document.getElementById("activeOnlyWrap");
    const categoryFilter = document.getElementById("category-filter");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const noticeBar = document.getElementById("noticeBar");
    const noticeText = document.getElementById("noticeText");
    const retryDataBtn = document.getElementById("retryDataBtn");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxClose = document.getElementById("lightboxClose");

    let allItems = [];
    let activeType = "projekt";
    let visibleCount = PAGE_SIZE;
    let lastOpenedId = null;
    let usingFallback = false;
    let seenMap = loadSeenMap();

    const galleryIndex = {};

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeRegExp(str = "") {
      return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(text, query) {
      const safe = escapeHtml(text || "");
      if (!query) return safe;
      const pattern = new RegExp(`(${escapeRegExp(query)})`, "gi");
      return safe.replace(pattern, "<mark>$1</mark>");
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso || "Ismeretlen";
      return d.toLocaleDateString("hu-HU", { year: "numeric", month: "long", day: "numeric" });
    }

    function dateStamp(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function getLastUpdate(item) {
      const historyDates = (item.history || []).map(h => dateStamp(h.date));
      const maxHistory = historyDates.length ? Math.max(...historyDates) : 0;
      return Math.max(maxHistory, dateStamp(item.date));
    }

    function normalizeItem(raw, idx) {
      const item = { ...raw };
      item.id = item.id || `item-${idx}-${Date.now()}`;
      item.type = item.type === "hir" ? "hir" : "projekt";
      item.status = item.type === "projekt" ? (STATUS_CONFIG[item.status] ? item.status : "tervezett") : "";
      item.category = item.category || (item.type === "projekt" ? "Egyéb" : "Hír");
      item.images = Array.isArray(item.images) && item.images.length ? item.images : [fallbackListImage];
      item.history = Array.isArray(item.history) ? item.history : [];
      item.short = item.short || "Rövid leírás hamarosan.";
      item.description = item.description || item.short;
      item.author = item.author || "Ismeretlen";
      item.investor = item.investor || "Nincs megadva";
      item.progress = item.type === "projekt" ? Number(item.progress || 0) : 0;
      item.lastUpdate = getLastUpdate(item);
      item.listImageFit = item.listImageFit === "contain" ? "contain" : "cover";
      return item;
    }

    function getListImage(item) {
      return item.listImage || (item.images && item.images[0]) || fallbackListImage;
    }

    function showFeedLoading(rows = 3) {
      feedEl.classList.remove("few-items", "single-item");
      feedEl.innerHTML = Array.from({ length: rows }, () => `<div class="skeleton-row"></div>`).join("");
      emptyEl.hidden = true;
      loadMoreBtn.hidden = true;
    }

    async function loadData() {
      showFeedLoading(4);
      noticeBar.hidden = true;
      usingFallback = false;

      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!Array.isArray(json)) throw new Error("A data forrás nem tömb.");
        allItems = json.map(normalizeItem);
      } catch (err) {
        console.error(err);
        usingFallback = true;
        allItems = LOCAL_FALLBACK_ITEMS.map(normalizeItem);
        noticeText.textContent = "A külső adatforrás nem elérhető. Helyi tartalék adatok töltve.";
        noticeBar.hidden = false;
      }

      allItems.forEach(item => {
        if (!(item.id in galleryIndex)) galleryIndex[item.id] = 0;
      });

      renderCategoryOptions();
      renderFeed();
    }

    function renderCategoryOptions() {
      const categories = [...new Set(
        allItems.filter(i => i.type === activeType).map(i => i.category).filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, "hu"));

      const current = categoryFilter.value || "all";
      categoryFilter.innerHTML = `
        <option value="all">Minden kategória</option>
        ${categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("")}
      `;
      if (categories.includes(current)) categoryFilter.value = current;
      else categoryFilter.value = "all";
    }

    function getFiltered() {
      const q = searchEl.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;

      let data = allItems
        .filter(item => item.type === activeType)
        .filter(item => selectedCategory === "all" ? true : item.category === selectedCategory)
        .filter(item => `${item.title} ${item.short} ${item.description} ${item.author} ${item.investor} ${item.category}`.toLowerCase().includes(q));

      if (activeType === "projekt" && activeOnly.checked) {
        data = data.filter(item => item.status !== "kesz");
      }

      return data.sort((a, b) => {
        if (activeType === "projekt") {
          const ao = STATUS_CONFIG[a.status]?.order ?? 99;
          const bo = STATUS_CONFIG[b.status]?.order ?? 99;
          if (ao !== bo) return ao - bo;
        }
        return dateStamp(b.date) - dateStamp(a.date);
      });
    }

    function isItemNew(item) {
      const seen = seenMap[item.id] || 0;
      return item.lastUpdate > seen;
    }

    function markItemRead(item) {
      seenMap[item.id] = item.lastUpdate;
      saveSeenMap(seenMap);
    }

    function markAllRead() {
      allItems.forEach(item => { seenMap[item.id] = item.lastUpdate; });
      saveSeenMap(seenMap);
      renderFeed();
    }

    function renderStats(filteredData, totalFilteredCount) {
      const newCount = allItems.filter(isItemNew).length;
      const chips = [];

      if (activeType === "projekt") {
        chips.push(`<span class="stat-chip">Épül: ${filteredData.filter(i => i.status === "epul").length}</span>`);
        chips.push(`<span class="stat-chip">Tervezett: ${filteredData.filter(i => i.status === "tervezett").length}</span>`);
        chips.push(`<span class="stat-chip">Kész: ${filteredData.filter(i => i.status === "kesz").length}</span>`);
      } else {
        chips.push(`<span class="stat-chip">Hírek: ${filteredData.length}</span>`);
      }

      chips.push(`<span class="stat-chip">Találat: ${totalFilteredCount}</span>`);

      if (newCount > 0) {
        chips.push(`<span class="stat-chip">Új frissítés: ${newCount}</span>`);
        chips.push(`<button id="markReadBtn" class="mini-btn" type="button">Összes olvasottnak</button>`);
      }

      statsBar.innerHTML = chips.join("");
      const markBtn = document.getElementById("markReadBtn");
      if (markBtn) markBtn.addEventListener("click", markAllRead);
    }

    function makeRow(item, index, query) {
      const st = STATUS_CONFIG[item.status] || { label: "Ismeretlen", chipClass: "" };
      const listImg = getListImage(item);
      const fitMode = item.listImageFit || (item.listImage && item.listImage.toLowerCase().includes("logo") ? "contain" : "cover");
      const isLogo = !(item.listImage || (item.images && item.images[0]));
      const newChip = isItemNew(item) ? `<span class="chip">Új</span>` : "";
      const lastUpdate = item.lastUpdate ? formatDate(item.lastUpdate) : "Ismeretlen";

      return `
        <article class="list-item ${item.type === "projekt" ? `status-${st.chipClass}-row` : ""}" style="animation-delay:${index * 0.03}s">
          <img
            class="mini-image ${isLogo ? "is-logo" : ""} ${fitMode === "contain" ? "fit-contain" : ""}"
            src="${listImg}"
            alt="${escapeHtml(item.title)}"
            onerror="this.onerror=null;this.src='${fallbackListImage}';this.classList.add('is-logo','fit-contain');"
          >
          <div>
            <h3 class="item-title">${highlightText(item.title, query)}</h3>
            <p class="item-meta">
              ${escapeHtml(formatDate(item.date))} | Írta: ${escapeHtml(item.author)} | ${escapeHtml(item.investor)}
            </p>
            <div class="chips">
              ${item.type === "projekt" ? `<span class="chip ${st.chipClass}">${st.label}</span>` : ""}
              ${item.type === "projekt" ? `<span class="chip">Készültség: ${item.progress ?? 0}%</span>` : ""}
              <span class="chip">${escapeHtml(item.category)}</span>
              <span class="chip">Utoljára frissítve: ${escapeHtml(lastUpdate)}</span>
              ${newChip}
            </div>
          </div>
          <button class="open-btn" data-open="${escapeHtml(item.id)}">Részletek</button>
        </article>
      `;
    }

    function renderState(title, desc, retry = false) {
      feedEl.classList.remove("few-items", "single-item");
      feedEl.innerHTML = `
        <div class="state-box">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(desc)}</p>
          ${retry ? `<button id="retryInlineBtn" class="load-more-btn" type="button">Újrapróbálás</button>` : ""}
        </div>
      `;
      if (retry) {
        const btn = document.getElementById("retryInlineBtn");
        if (btn) btn.addEventListener("click", loadData);
      }
    }

    function renderProjectGroups(data, query) {
      let rowIndex = 0;
      const html = STATUS_GROUPS.map(group => {
        const list = data.filter(i => i.status === group.key);
        if (!list.length) return "";
        return `
          <section class="status-group status-${group.key}">
            <div class="status-head">
              <span>${group.title}</span>
              <span class="count">${list.length} db</span>
            </div>
            ${list.map(item => makeRow(item, rowIndex++, query)).join("")}
          </section>
        `;
      }).join("");

      feedEl.innerHTML = html || "";
    }

    function renderFeed() {
      const data = getFiltered();
      const query = searchEl.value.trim();

      const visible = data.slice(0, visibleCount);
      renderStats(visible, data.length);

      emptyEl.hidden = data.length > 0;
      feedEl.classList.toggle("few-items", visible.length > 0 && visible.length <= 2);
      feedEl.classList.toggle("single-item", visible.length === 1);

      loadMoreBtn.hidden = visible.length >= data.length;
      loadMoreBtn.textContent = `Továbbiak (${data.length - visible.length})`;

      if (!data.length) {
        renderState("Nincs találat", "Próbálj más keresést vagy kategóriát.");
        loadMoreBtn.hidden = true;
        return;
      }

      if (activeType === "projekt") {
        renderProjectGroups(visible, query);
      } else {
        feedEl.innerHTML = visible.map((item, i) => makeRow(item, i, query)).join("");
      }
    }

    function renderDetail(itemId) {
      const item = allItems.find(x => x.id === itemId);
      if (!item) return;

      markItemRead(item);
      renderStats(getFiltered().slice(0, visibleCount), getFiltered().length);

      lastOpenedId = item.id;
      const statusLabel = item.type === "projekt" ? (STATUS_CONFIG[item.status]?.label || "Nincs") : "";
      const current = item.images[galleryIndex[item.id]] || item.images[0] || fallbackListImage;
      const multiImage = item.images && item.images.length > 1;

      detailPanel.innerHTML = `
        <div class="panel-top">
          <div>
            <h3 class="panel-title">${escapeHtml(item.title)}</h3>
            <p class="panel-meta">${escapeHtml(formatDate(item.date))} | Írta: ${escapeHtml(item.author)} | Befektető/frakció: ${escapeHtml(item.investor)}</p>
          </div>
          <div class="panel-actions">
            <button class="share-btn" id="copyLinkBtn" aria-label="Link másolása">⎘</button>
            <button class="close-panel" id="closeDetail" aria-label="Bezárás">×</button>
          </div>
        </div>

        <p class="panel-desc">${escapeHtml(item.description)}</p>

        ${item.type === "projekt" ? `
          <div class="progress-wrap">
            <div class="progress-text">Készültség: ${item.progress ?? 0}% | Állapot: ${statusLabel}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${item.progress ?? 0}%"></div></div>
          </div>
        ` : ""}

        <div class="gallery-main-wrap" data-open-lightbox="${escapeHtml(current)}">
          <img class="gallery-main" src="${escapeHtml(current)}" alt="${escapeHtml(item.title)}" onerror="this.onerror=null;this.src='${fallbackListImage}';">
          ${multiImage ? `
            <div class="gallery-nav">
              <button class="gallery-btn" data-gallery="prev" data-id="${escapeHtml(item.id)}" aria-label="Előző kép"><</button>
              <button class="gallery-btn" data-gallery="next" data-id="${escapeHtml(item.id)}" aria-label="Következő kép">></button>
            </div>
          ` : ""}
        </div>

        ${multiImage ? `<p class="swipe-hint">Mobilon lapozhatsz jobbra-balra a képen.</p>` : ""}

        ${multiImage ? `
          <div class="thumbs">
            ${item.images.map((src, idx) => `
              <button class="thumb ${galleryIndex[item.id] === idx ? "active" : ""}" data-gallery="thumb" data-id="${escapeHtml(item.id)}" data-index="${idx}" aria-label="Kép ${idx + 1}">
                <img src="${escapeHtml(src)}" alt="${escapeHtml(item.title)} ${idx + 1}" onerror="this.onerror=null;this.src='${fallbackListImage}';">
              </button>
            `).join("")}
          </div>
        ` : ""}

        <details class="history">
          <summary>Frissítési history</summary>
          <ul class="history-list">
            ${(item.history || []).map(h => `<li><strong>${escapeHtml(formatDate(h.date))}</strong> - ${escapeHtml(h.text)}</li>`).join("")}
          </ul>
        </details>
      `;

      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      window.location.hash = item.id;

      bindSwipeForGallery(item.id);

      const copyBtn = document.getElementById("copyLinkBtn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          const shareUrl = `${window.location.origin}${window.location.pathname}#${item.id}`;
          try {
            await navigator.clipboard.writeText(shareUrl);
            copyBtn.textContent = "✓";
            setTimeout(() => { copyBtn.textContent = "⎘"; }, 1200);
          } catch (_) {
            alert("A link másolása nem sikerült.");
          }
        });
      }
    }

    function closeDetail() {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
      detailPanel.innerHTML = "";
      document.body.style.overflow = "";
      if (window.location.hash) history.replaceState(null, "", window.location.pathname);
    }

    function stepGallery(id, dir) {
      const item = allItems.find(x => x.id === id);
      if (!item || !item.images || item.images.length < 2) return;
      galleryIndex[id] = (galleryIndex[id] + dir + item.images.length) % item.images.length;
      renderDetail(id);
    }

    function openLightbox(src) {
      lightboxImg.src = src || fallbackListImage;
      lightbox.classList.add("active");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImg.src = "";
    }

    function bindSwipeForGallery(id) {
      const zone = detailPanel.querySelector(".gallery-main-wrap");
      if (!zone) return;

      let startX = 0;
      let endX = 0;

      zone.addEventListener("touchstart", (e) => {
        startX = e.changedTouches[0].clientX;
      }, { passive: true });

      zone.addEventListener("touchend", (e) => {
        endX = e.changedTouches[0].clientX;
        const delta = endX - startX;
        if (Math.abs(delta) < 40) return;
        if (delta < 0) stepGallery(id, 1);
        else stepGallery(id, -1);
      }, { passive: true });
    }

    function resetPagination() {
      visibleCount = PAGE_SIZE;
    }

    function loadSeenMap() {
      try {
        const raw = localStorage.getItem(SEEN_KEY);
        const obj = raw ? JSON.parse(raw) : {};
        return typeof obj === "object" && obj ? obj : {};
      } catch {
        return {};
      }
    }

    function saveSeenMap(map) {
      localStorage.setItem(SEEN_KEY, JSON.stringify(map));
    }

    feedEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-open]");
      if (!btn) return;
      renderDetail(btn.dataset.open);
    });

    detailPanel.addEventListener("click", (e) => {
      if (e.target.id === "closeDetail") {
        closeDetail();
        return;
      }

      const lightboxTarget = e.target.closest("[data-open-lightbox]");
      if (lightboxTarget) {
        openLightbox(lightboxTarget.dataset.openLightbox);
        return;
      }

      const g = e.target.closest("[data-gallery]");
      if (!g) return;

      const id = g.dataset.id;
      if (g.dataset.gallery === "prev") stepGallery(id, -1);
      if (g.dataset.gallery === "next") stepGallery(id, 1);
      if (g.dataset.gallery === "thumb") {
        galleryIndex[id] = Number(g.dataset.index);
        renderDetail(id);
      }
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeDetail();
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    lightboxClose.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (lightbox.classList.contains("active")) closeLightbox();
        else if (modal.classList.contains("active")) closeDetail();
      }

      if (modal.classList.contains("active") && lastOpenedId) {
        if (e.key === "ArrowLeft") stepGallery(lastOpenedId, -1);
        if (e.key === "ArrowRight") stepGallery(lastOpenedId, 1);
      }
    });

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeType = btn.dataset.type;
        activeOnlyWrap.style.display = activeType === "projekt" ? "inline-flex" : "none";
        renderCategoryOptions();
        resetPagination();
        renderFeed();
      });
    });

    searchEl.addEventListener("input", () => {
      resetPagination();
      renderFeed();
    });

    categoryFilter.addEventListener("change", () => {
      resetPagination();
      renderFeed();
    });

    activeOnly.addEventListener("change", () => {
      resetPagination();
      renderFeed();
    });

    loadMoreBtn.addEventListener("click", () => {
      visibleCount += PAGE_SIZE;
      renderFeed();
    });

    retryDataBtn.addEventListener("click", loadData);

    window.addEventListener("load", async () => {
      activeOnlyWrap.style.display = "inline-flex";
      await loadData();

      const hashId = window.location.hash.replace("#", "");
      if (hashId && allItems.some(i => i.id === hashId)) {
        const target = allItems.find(i => i.id === hashId);
        activeType = target.type;
        tabs.forEach(b => b.classList.toggle("active", b.dataset.type === activeType));
        activeOnlyWrap.style.display = activeType === "projekt" ? "inline-flex" : "none";
        renderCategoryOptions();
        resetPagination();
        renderFeed();
        setTimeout(() => renderDetail(hashId), 180);
      }

      if (!usingFallback && !allItems.length) {
        renderState("Nincs adatforrás", "Nem érkezett betölthető tartalom.", true);
      }
    });
  </script>
</body>
</html>
