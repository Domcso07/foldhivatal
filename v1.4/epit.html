<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Beruházások, Hírek és Események - Földhivatal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    html, body { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; width: 0; height: 0; }

    .page-title { text-align: center; margin: 0; font-size: clamp(28px, 4vw, 40px); }
    .page-subtitle { text-align: center; color: var(--muted); max-width: 860px; margin: 10px auto 0; line-height: 1.6; }

    .tools { display: grid; gap: 10px; margin-top: 8px; }
    .tab-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .tab-btn {
      border: 1px solid #2b2f48;
      border-radius: 10px;
      padding: 9px 14px;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      min-height: 42px;
      cursor: pointer;
      transition: .2s ease;
    }
    .tab-btn.active {
      border-color: var(--accent);
      background: rgba(59,130,246,.16);
      box-shadow: 0 0 0 1px rgba(59,130,246,.15) inset;
    }

    .subtools { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }

    #search-input, #category-filter {
      width: 100%;
      max-width: 340px;
      margin: 0;
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2b2f48;
      background: #171a2b;
      color: #e5e7eb;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }

    .stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-chip {
      border: 1px solid #2b2f48;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      color: var(--muted);
      background: #131727;
    }

    .notice {
      display: none;
      border: 1px solid #2b2f48;
      border-radius: 12px;
      background: rgba(239,68,68,.08);
      color: #fca5a5;
      padding: 10px 12px;
      font-size: 13px;
    }
    .notice.active { display: block; }

    .featured-wrap { display: none; margin-top: 14px; }
    .featured-wrap.active { display: block; }

    /* ===== KONCERT SZINPAD ===== */
    .concert-stage-wrap {
      position: relative;
      perspective: 1300px;
      margin: 0 4px;
      padding: 14px 0 34px;
      overflow: visible;
    }

    .concert-stage {
      position: relative;
      min-height: 360px;
      border-radius: 20px;
      border: 1px solid #2f3654;
      background: linear-gradient(180deg, #151d33 0%, #0f1526 100%);
      box-shadow:
        0 28px 90px rgba(0,0,0,.58),
        inset 0 1px 0 rgba(255,255,255,.06);
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .stage-floor {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: -34px;
      height: 44px;
      background: linear-gradient(180deg, #202b45, #0f1629);
      border: 1px solid #2f3654;
      border-radius: 0 0 14px 14px;
      transform: rotateX(56deg);
      transform-origin: top center;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.45));
      z-index: 2;
    }

    .stage-roof {
      position: absolute;
      left: 6%;
      right: 6%;
      top: -13px;
      height: 14px;
      border: 1px solid #42527d;
      border-radius: 8px;
      background: linear-gradient(90deg, #2b3552, #42527d, #2b3552);
      box-shadow: 0 0 18px rgba(59,130,246,.28);
      z-index: 6;
    }

    .speaker {
      position: absolute;
      top: 54px;
      width: 96px;
      height: 184px;
      border-radius: 12px;
      border: 1px solid #2b3654;
      background: linear-gradient(180deg, #0e1321, #0a0f1a);
      box-shadow: 0 16px 34px rgba(0,0,0,.5);
      z-index: 7;
      overflow: hidden;
    }

    .speaker.left {
      left: -44px;
      transform: rotateY(19deg) translateZ(26px);
    }

    .speaker.right {
      right: -44px;
      transform: rotateY(-19deg) translateZ(26px);
    }

    .speaker::before,
    .speaker::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid #2e3a5a;
      background: radial-gradient(circle at 30% 30%, #2a3550, #121a2d);
      box-shadow: inset 0 0 18px rgba(0,0,0,.55);
    }

    .speaker::before {
      top: 20px;
      width: 56px;
      height: 56px;
    }

    .speaker::after {
      bottom: 18px;
      width: 64px;
      height: 64px;
    }

    .stage-lights {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    .beam {
      position: absolute;
      top: -140px;
      width: 230px;
      height: 520px;
      opacity: 0;
      filter: blur(2px);
      transform-origin: top center;
      clip-path: polygon(46% 0, 56% 0, 100% 100%, 0 100%);
    }

    .beam.left {
      left: 12%;
      background: linear-gradient(180deg, rgba(59,130,246,.36), rgba(59,130,246,0));
    }

    .beam.mid {
      left: calc(50% - 115px);
      background: linear-gradient(180deg, rgba(251,191,36,.3), rgba(251,191,36,0));
    }

    .beam.right {
      right: 12%;
      background: linear-gradient(180deg, rgba(168,85,247,.34), rgba(168,85,247,0));
    }

    .fog {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -18px;
      height: 130px;
      opacity: 0;
      background:
        radial-gradient(ellipse at 25% 50%, rgba(59,130,246,.22), rgba(59,130,246,0) 65%),
        radial-gradient(ellipse at 75% 50%, rgba(168,85,247,.20), rgba(168,85,247,0) 65%);
      filter: blur(20px);
    }

    .stage-content {
      position: relative;
      z-index: 8;
      display: grid;
      grid-template-columns: 1.08fr 1fr;
      gap: 14px;
      align-items: stretch;
      padding: 16px;
      min-height: 330px;
    }

    .stage-screen {
      border: 1px solid #2b3654;
      border-radius: 14px;
      overflow: hidden;
      background: #0c1221;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 0 40px rgba(59,130,246,.18);
    }

    .stage-screen img {
      width: 100%;
      height: 100%;
      min-height: 290px;
      object-fit: cover;
      display: block;
    }

    .stage-label {
      display: inline-flex;
      border: 1px solid rgba(59,130,246,.45);
      color: #bfdbfe;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      margin-bottom: 8px;
      background: rgba(59,130,246,.16);
    }

    .stage-title {
      margin: 0 0 6px;
      font-size: clamp(24px, 3.2vw, 40px);
      line-height: 1.04;
      text-shadow:
        0 0 8px rgba(59,130,246,.35),
        0 0 26px rgba(59,130,246,.25);
    }

    .stage-sub {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 64ch;
    }

    .stage-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .stage-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .stage-btn {
      border: 1px solid #2b2f48;
      border-radius: 10px;
      padding: 9px 12px;
      min-height: 42px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      color: var(--text);
      background: #171b2f;
    }

    .stage-btn.primary {
      border-color: rgba(59,130,246,.5);
      background: rgba(59,130,246,.2);
      color: #dbeafe;
      box-shadow: 0 8px 24px rgba(59,130,246,.24);
    }

    .stage-shell.live .beam,
    .stage-shell.live .fog {
      opacity: 1;
    }

    .stage-shell.profile-nagykoncert-2026.live .beam.left { animation: beamLeft 3.8s ease-in-out infinite; }
    .stage-shell.profile-nagykoncert-2026.live .beam.mid { animation: beamMid 3.2s ease-in-out infinite; }
    .stage-shell.profile-nagykoncert-2026.live .beam.right { animation: beamRight 4.1s ease-in-out infinite; }
    .stage-shell.profile-nagykoncert-2026.live .fog { animation: fogPulse 3.0s ease-in-out infinite; }

    .stage-shell.profile-nagykoncert-2026:hover .beam.left { animation-duration: 2.1s; }
    .stage-shell.profile-nagykoncert-2026:hover .beam.mid { animation-duration: 1.8s; }
    .stage-shell.profile-nagykoncert-2026:hover .beam.right { animation-duration: 2.2s; }

    .feed { margin-top: 14px; display: grid; gap: 10px; }

    .skeleton-row {
      height: 102px;
      border: 1px solid #24263a;
      border-radius: 14px;
      background: linear-gradient(90deg, #171a2b 25%, #1e2338 50%, #171a2b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    .status-group {
      margin-top: 6px;
      border: 1px solid #24263a;
      border-radius: 14px;
      overflow: hidden;
      background: #121628;
    }

    .status-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid #24263a;
    }

    .status-head .count { font-size: 11px; color: var(--muted); }
    .status-epul .status-head { color: #fcd34d; background: rgba(180,83,9,.12); }
    .status-tervezett .status-head { color: #c4b5fd; background: rgba(109,40,217,.12); }
    .status-kesz .status-head { color: #86efac; background: rgba(22,163,74,.12); }

    .list-item {
      display: grid;
      grid-template-columns: clamp(120px, 12vw, 170px) minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #202438;
      padding: 10px;
      position: relative;
      opacity: 0;
      transform: translateY(8px);
      animation: listIn .35s ease forwards;
    }

    .list-item:first-of-type { border-top: none; }

    .list-item.status-kesz-row::before,
    .list-item.status-epul-row::before,
    .list-item.status-tervezett-row::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 2px;
    }

    .list-item.status-kesz-row::before { background: #16a34a; }
    .list-item.status-epul-row::before { background: #f59e0b; }
    .list-item.status-tervezett-row::before { background: #8b5cf6; }

    .mini-image {
      width: 100%;
      height: 92px;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
      border: 1px solid #2b2f48;
      background: #101427;
    }

    .mini-image.fit-contain,
    .mini-image.is-logo {
      object-fit: contain;
      object-position: left center;
      padding: 6px;
      background: #0f1220;
    }

    .item-title { margin: 0 0 4px; font-size: 18px; line-height: 1.2; overflow-wrap: anywhere; }
    .item-meta { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; overflow-wrap: anywhere; }

    .chips { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }

    .chip {
      border: 1px solid #2b2f48;
      border-radius: 999px;
      background: #131727;
      color: var(--muted);
      font-size: 11px;
      padding: 4px 8px;
    }

    .chip.kesz { color: #86efac; border-color: rgba(22,163,74,.35); background: rgba(22,163,74,.14); }
    .chip.epul { color: #fcd34d; border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.14); }
    .chip.tervezett { color: #c4b5fd; border-color: rgba(139,92,246,.35); background: rgba(139,92,246,.14); }

    .chip.event-közelgő { color: #86efac; border-color: rgba(22,163,74,.35); background: rgba(22,163,74,.14); }
    .chip.event-hamarosan { color: #fcd34d; border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.14); }
    .chip.event-folyamatban { color: #93c5fd; border-color: rgba(59,130,246,.35); background: rgba(59,130,246,.14); }
    .chip.event-vége { color: #cbd5e1; border-color: rgba(148,163,184,.35); background: rgba(148,163,184,.12); }
    .chip.event-elmaradt { color: #fca5a5; border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.12); }
    .chip.event-áthelyezve { color: #d8b4fe; border-color: rgba(168,85,247,.35); background: rgba(168,85,247,.14); }

    mark {
      background: rgba(59,130,246,.25);
      color: #dbeafe;
      border-radius: 4px;
      padding: 0 2px;
    }

    .open-btn {
      border: 1px solid #2b2f48;
      background: #151a2d;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      min-width: 88px;
      white-space: nowrap;
      font-weight: 600;
      min-height: 42px;
    }

    .state-box {
      border: 1px solid #2b2f48;
      border-radius: 14px;
      background: #121628;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }

    .state-box h3 { margin: 0 0 8px; color: var(--text); font-size: 18px; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      padding: 16px;
      background: rgba(10,12,20,.86);
      backdrop-filter: blur(6px);
    }

    .modal.active { display: grid; place-items: center; }

    .panel {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      background: #121628;
      border: 1px solid #2b2f48;
      border-radius: 16px;
      padding: 14px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel-title { margin: 0 0 5px; font-size: 30px; line-height: 1.15; }
    .panel-meta { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.45; }

    .panel-actions { display: flex; gap: 6px; align-items: center; }

    .close-panel, .share-btn {
      width: 42px;
      height: 42px;
      border: 1px solid #2b2f48;
      border-radius: 10px;
      background: #181d31;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .panel-desc { margin: 0 0 14px; line-height: 1.7; }

    .progress-wrap { margin-bottom: 12px; }
    .progress-text { color: var(--muted); font-size: 13px; margin-bottom: 6px; }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #2b2f48;
      overflow: hidden;
      background: #101427;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #3b82f6, #16a34a);
      animation: glowBar 2.2s ease-in-out infinite;
    }

    .gallery-main-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2b2f48;
      background: #0c0f1a;
      touch-action: pan-y;
      cursor: zoom-in;
    }

    .gallery-main {
      width: 100%;
      height: clamp(210px, 42vw, 500px);
      object-fit: cover;
      display: block;
    }

    .gallery-nav {
      position: absolute;
      inset: auto 8px 8px auto;
      display: flex;
      gap: 6px;
    }

    .gallery-btn {
      width: 40px;
      height: 40px;
      border-radius: 9px;
      border: 1px solid #2b2f48;
      background: rgba(15,18,32,.88);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    .thumbs {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
    }

    .thumb {
      border: 1px solid #2b2f48;
      border-radius: 8px;
      overflow: hidden;
      background: #101427;
      padding: 0;
      cursor: pointer;
      min-height: 72px;
    }

    .thumb img {
      width: 100%;
      height: 68px;
      object-fit: cover;
      display: block;
      opacity: .72;
    }

    .thumb.active { border-color: var(--accent); }
    .thumb.active img, .thumb:hover img { opacity: 1; }

    details.history {
      margin-top: 12px;
      border-top: 1px solid #2b2f48;
      padding-top: 10px;
    }

    details.history summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    details.history summary::-webkit-details-marker { display: none; }
    details.history summary::after { content: "+"; font-size: 18px; color: var(--muted); }
    details.history[open] summary::after { content: "-"; }

    .history-list {
      margin: 6px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .history-list li {
      border-left: 2px solid #2b2f48;
      padding-left: 10px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    .history-list strong { color: var(--text); }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      place-items: center;
      background: rgba(5,7,14,.95);
      padding: 14px;
    }

    .lightbox.active { display: grid; }

    .lightbox img {
      max-width: min(1400px, 100%);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #2b2f48;
    }

    .lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border: 1px solid #2b2f48;
      border-radius: 10px;
      background: #181d31;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes listIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes glowBar { 0% { filter: brightness(.9); } 50% { filter: brightness(1.2); } 100% { filter: brightness(.9); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @keyframes beamLeft {
      0%,100% { transform: rotate(-10deg) scaleY(.95); }
      50% { transform: rotate(10deg) scaleY(1.07); }
    }

    @keyframes beamMid {
      0%,100% { transform: rotate(0deg) scaleY(.92); }
      50% { transform: rotate(2deg) scaleY(1.06); }
    }

    @keyframes beamRight {
      0%,100% { transform: rotate(10deg) scaleY(.95); }
      50% { transform: rotate(-10deg) scaleY(1.07); }
    }

    @keyframes fogPulse {
      0%,100% { transform: scaleX(.95); opacity: .48; }
      50% { transform: scaleX(1.05); opacity: .85; }
    }

    @media (max-width: 900px) {
      #search-input, #category-filter { max-width: 100%; }
      .subtools { align-items: stretch; }
      .filter-row { flex-direction: column; align-items: stretch; }

      .stage-content { grid-template-columns: 1fr; }
      .speaker { display: none; }
      .stage-front { display: none; }
    }

    @media (max-width: 768px) {
      .tab-row { display: grid; grid-template-columns: 1fr 1fr 1fr; }
      .tab-btn { width: 100%; font-size: 12px; padding: 8px 10px; }

      .subtools { flex-direction: column; align-items: stretch; }

      .list-item { grid-template-columns: 1fr; align-items: start; }
      .mini-image { height: 164px; }
      .open-btn { width: 100%; }

      .modal { padding: 0; align-items: end; }
      .panel {
        width: 100%;
        max-height: 100dvh;
        min-height: 90dvh;
        border-radius: 14px 14px 0 0;
        border-bottom: none;
        padding: 12px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .panel-title { font-size: 22px; }
      .panel-meta { font-size: 13px; }

      .gallery-main { height: 230px; }
      .thumbs { display: flex; overflow-x: auto; }
      .thumb { flex: 0 0 92px; }

      .spotlight, .fog, .stage-roof { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav container">
      <div class="brand">
        <img src="images/foldhivatal.png" alt="Földhivatal logó" class="logo-img" />
        <h1>Földhivatal</h1>
      </div>
      <div class="menu">
        <a class="btn secondary" href="index.html">Kezdőlap</a>
        <a class="btn secondary" href="urlap.html">Űrlap</a>
        <a class="btn secondary" href="nyilvantartas.html">Nyilvántartás</a>
        <a class="btn secondary" href="szabalyzat.html">Szabályzat</a>
        <a class="btn secondary" href="csapat.html">Csapat</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2 class="page-title">Beruházások, Hírek és Események</h2>
      <p class="page-subtitle">
        Kompakt listában látod a frissítéseket. A részletek nézetben képek, history és teljes leírás jelenik meg.
      </p>
    </section>

    <section class="container">
      <div class="tools">
        <div class="tab-row">
          <button class="tab-btn active" data-type="projekt">Építkezések</button>
          <button class="tab-btn" data-type="hir">Hírek</button>
          <button class="tab-btn" data-type="esemeny">Események</button>
        </div>

        <div class="subtools">
          <div class="filter-row">
            <input id="search-input" type="text" placeholder="Keresés címre, frakcióra vagy szerzőre..." />
            <select id="category-filter" aria-label="Kategória szűrés"></select>
          </div>
          <label class="switch" id="activeOnlyWrap">
            <input type="checkbox" id="activeOnly" />
            Csak épülő és tervezett
          </label>
        </div>

        <div id="noticeBar" class="notice"></div>
        <div class="stats" id="statsBar"></div>
      </div>

      <div id="featuredWrap" class="featured-wrap"></div>
      <div id="feed" class="feed"></div>
      <p id="emptyState" class="state-box" hidden></p>
    </section>
  </main>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div id="detailPanel" class="panel"></div>
  </div>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button id="lightboxClose" class="lightbox-close" aria-label="Bezárás">×</button>
    <img id="lightboxImg" src="" alt="Nagyított kép" />
  </div>

  <footer>
    © 2026 Magyar/HUN RP - Földhivatal |
    <a href="https://discord.gg/jt8veFAWYy" target="_blank" rel="noopener noreferrer">Discord</a>
  </footer>

  <script>
    const DATA_URL = "data/epitkezes.json";
    const fallbackListImage = "images/foldhivatal.png";

    const STATUS_CONFIG = {
      epul: { label: "Épül", order: 1, chipClass: "epul" },
      tervezett: { label: "Tervezett", order: 2, chipClass: "tervezett" },
      kesz: { label: "Kész", order: 3, chipClass: "kesz" }
    };

    const EVENT_STATUS_CONFIG = {
      "közelgő": { label: "Közelgő", order: 1, chipClass: "event-közelgő" },
      "hamarosan": { label: "Hamarosan", order: 2, chipClass: "event-hamarosan" },
      "folyamatban": { label: "Folyamatban", order: 3, chipClass: "event-folyamatban" },
      "áthelyezve": { label: "Áthelyezve", order: 4, chipClass: "event-áthelyezve" },
      "vége": { label: "Vége", order: 5, chipClass: "event-vége" },
      "elmaradt": { label: "Elmaradt", order: 6, chipClass: "event-elmaradt" }
    };

    const STATUS_GROUPS = [
      { key: "epul", title: "Folyamatban lévő projektek" },
      { key: "tervezett", title: "Tervezett projektek" },
      { key: "kesz", title: "Kész projektek" }
    ];

    const feedEl = document.getElementById("feed");
    const featuredWrap = document.getElementById("featuredWrap");
    const searchEl = document.getElementById("search-input");
    const emptyEl = document.getElementById("emptyState");
    const tabs = document.querySelectorAll(".tab-btn");
    const modal = document.getElementById("detailModal");
    const detailPanel = document.getElementById("detailPanel");
    const statsBar = document.getElementById("statsBar");
    const activeOnly = document.getElementById("activeOnly");
    const activeOnlyWrap = document.getElementById("activeOnlyWrap");
    const categoryFilter = document.getElementById("category-filter");
    const noticeBar = document.getElementById("noticeBar");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxClose = document.getElementById("lightboxClose");

    let items = [];
    let activeType = "projekt";
    let lastOpenedId = null;
    const galleryIndex = {};
    let stageObserver = null;

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeRegExp(str = "") {
      return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(text, query) {
      const safe = escapeHtml(text || "");
      if (!query) return safe;
      const pattern = new RegExp(`(${escapeRegExp(query)})`, "gi");
      return safe.replace(pattern, "<mark>$1</mark>");
    }

    function formatDate(iso) {
      if (!iso) return "Nincs dátum";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso || "Ismeretlen";
      return d.toLocaleDateString("hu-HU", { year: "numeric", month: "long", day: "numeric" });
    }

    function dateStamp(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function getLastUpdate(item) {
      const historyDates = (item.history || []).map(h => dateStamp(h.date));
      const maxHistory = historyDates.length ? Math.max(...historyDates) : 0;
      return Math.max(maxHistory, dateStamp(item.date));
    }

    function normalizeFeaturedAnim(rawAnim) {
      if (!rawAnim) return "default";
      if (rawAnim === "NagyKoncert-2026") return "NagyKoncert-2026";
      return "default";
    }

    function normalizeItem(raw, idx) {
      const item = { ...raw };
      item.id = item.id || `item-${idx}-${Date.now()}`;
      item.type = ["projekt", "hir", "esemeny"].includes(item.type) ? item.type : "hir";
      item.status = item.type === "projekt" ? (STATUS_CONFIG[item.status] ? item.status : "tervezett") : "";
      item.eventStatus = item.type === "esemeny" ? (EVENT_STATUS_CONFIG[item.eventStatus] ? item.eventStatus : "hamarosan") : "";
      item.category = item.category || (item.type === "projekt" ? "Egyéb" : item.type === "esemeny" ? "Esemény" : "Hír");
      item.images = Array.isArray(item.images) && item.images.length ? item.images : [fallbackListImage];
      item.history = Array.isArray(item.history) ? item.history : [];
      item.tags = Array.isArray(item.tags) ? item.tags : [];
      item.short = item.short || "Rövid leírás hamarosan.";
      item.description = item.description || item.short;
      item.author = item.author || "Ismeretlen";
      item.investor = item.investor || "Nincs megadva";
      item.progress = item.type === "projekt" ? Number(item.progress || 0) : 0;
      item.listImageFit = item.listImageFit === "contain" ? "contain" : "cover";
      item.featured = Boolean(item.featured);
      item.featuredAnim = normalizeFeaturedAnim(item.featuredAnim);
      item.eventDateText = item.eventDateText || (item.date ? formatDate(item.date) : "Pontos időpont bejelentés alatt");
      item.venue = item.venue || "Helyszín: hamarosan";
      return item;
    }

    function getListImage(item) {
      return item.listImage || (item.images && item.images[0]) || fallbackListImage;
    }

    function showLoading(rows = 3) {
      featuredWrap.classList.remove("active");
      featuredWrap.innerHTML = "";
      feedEl.innerHTML = Array.from({ length: rows }, () => `<div class="skeleton-row"></div>`).join("");
      emptyEl.hidden = true;
    }

    async function loadItemsFromJson() {
      showLoading(4);
      noticeBar.classList.remove("active");
      noticeBar.textContent = "";

      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("A JSON nem tömb.");

        items = data.map(normalizeItem);

        Object.keys(galleryIndex).forEach(k => delete galleryIndex[k]);
        items.forEach(i => { galleryIndex[i.id] = 0; });

        renderCategoryOptions();
        renderFeed();
      } catch (err) {
        console.error(err);
        items = [];
        renderCategoryOptions();
        renderFeed();
        noticeBar.textContent = "Nem sikerült betölteni a data/epitkezes.json fájlt. Ellenőrizd az útvonalat és a szervert.";
        noticeBar.classList.add("active");
      }
    }

    function renderCategoryOptions() {
      const categories = [...new Set(
        items.filter(i => i.type === activeType).map(i => i.category).filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, "hu"));

      const current = categoryFilter.value || "all";
      categoryFilter.innerHTML = `
        <option value="all">Minden kategória</option>
        ${categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("")}
      `;
      if (categories.includes(current)) categoryFilter.value = current;
      else categoryFilter.value = "all";
    }

    function getFiltered() {
      const q = searchEl.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value;

      let data = items
        .filter(item => item.type === activeType)
        .filter(item => selectedCategory === "all" ? true : item.category === selectedCategory)
        .filter(item => `${item.title} ${item.short} ${item.description} ${item.author} ${item.investor} ${item.category}`.toLowerCase().includes(q));

      if (activeType === "projekt" && activeOnly.checked) {
        data = data.filter(item => item.status !== "kesz");
      }

      return data.sort((a, b) => {
        if (activeType === "projekt") {
          const ao = STATUS_CONFIG[a.status]?.order ?? 99;
          const bo = STATUS_CONFIG[b.status]?.order ?? 99;
          if (ao !== bo) return ao - bo;
        }
        if (activeType === "esemeny") {
          const ao = EVENT_STATUS_CONFIG[a.eventStatus]?.order ?? 99;
          const bo = EVENT_STATUS_CONFIG[b.eventStatus]?.order ?? 99;
          if (ao !== bo) return ao - bo;
        }
        return dateStamp(b.date) - dateStamp(a.date);
      });
    }

    function renderStats(data) {
      if (activeType === "projekt") {
        statsBar.innerHTML = `
          <span class="stat-chip">Épül: ${data.filter(i => i.status === "epul").length}</span>
          <span class="stat-chip">Tervezett: ${data.filter(i => i.status === "tervezett").length}</span>
          <span class="stat-chip">Kész: ${data.filter(i => i.status === "kesz").length}</span>
          <span class="stat-chip">Összes: ${data.length}</span>
        `;
        return;
      }

      if (activeType === "esemeny") {
        statsBar.innerHTML = `
          <span class="stat-chip">Kiemelt: ${data.filter(i => i.featured).length}</span>
          <span class="stat-chip">Aktív: ${data.filter(i => ["közelgő","hamarosan","folyamatban"].includes(i.eventStatus)).length}</span>
          <span class="stat-chip">Összes: ${data.length}</span>
        `;
        return;
      }

      statsBar.innerHTML = `<span class="stat-chip">Hírek: ${data.length}</span>`;
    }

    function getStageProfileClass(anim) {
      if (anim === "NagyKoncert-2026") return "profile-nagykoncert-2026";
      return "profile-default";
    }

    function observeStage() {
      if (stageObserver) stageObserver.disconnect();

      stageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          entry.target.classList.toggle("live", entry.isIntersecting);
        });
      }, { threshold: 0.3 });

      const stage = document.getElementById("featuredStage");
      if (stage) stageObserver.observe(stage);
    }

    function renderFeaturedEvent(data) {
      if (activeType !== "esemeny") {
        featuredWrap.classList.remove("active");
        featuredWrap.innerHTML = "";
        return null;
      }

      const featured = data.find(i => i.featured);
      if (!featured) {
        featuredWrap.classList.remove("active");
        featuredWrap.innerHTML = "";
        return null;
      }

      const es = EVENT_STATUS_CONFIG[featured.eventStatus] || EVENT_STATUS_CONFIG["hamarosan"];
      const media = getListImage(featured);
      const profile = getStageProfileClass(featured.featuredAnim);

      featuredWrap.innerHTML = `
        <section class="concert-stage-wrap">
          <article class="concert-stage stage-shell ${profile}" id="featuredStage">
            <div class="stage-roof"></div>
            <div class="speaker left"></div>
            <div class="speaker right"></div>

            <div class="stage-lights">
              <div class="beam left"></div>
              <div class="beam mid"></div>
              <div class="beam right"></div>
              <div class="fog"></div>
            </div>

            <div class="stage-content">
              <div class="stage-screen">
                <img src="${escapeHtml(media)}" alt="${escapeHtml(featured.title)}" onerror="this.onerror=null;this.src='${fallbackListImage}'">
              </div>
              <div>
                <span class="stage-label">Kiemelt esemény</span>
                <h3 class="stage-title">${escapeHtml(featured.title)}</h3>
                <p class="stage-sub">${escapeHtml(featured.featuredSubtitle || featured.short)}</p>

                <div class="stage-meta">
                  <span class="chip ${es.chipClass}">${es.label}</span>
                  <span class="chip">${escapeHtml(featured.eventDateText || "Pontos időpont bejelentés alatt")}</span>
                  <span class="chip">${escapeHtml(featured.venue || "Helyszín: hamarosan")}</span>
                  <span class="chip">${escapeHtml(featured.category)}</span>
                </div>

                <div class="stage-actions">
                  <button class="stage-btn primary" data-open="${escapeHtml(featured.id)}">Részletek</button>
                  <a class="stage-btn" href="https://discord.gg/jt8veFAWYy" target="_blank" rel="noopener noreferrer">Értesítést kérek</a>
                </div>
              </div>
            </div>

            <div class="stage-floor"></div>
          </article>
        </section>
      `;

      featuredWrap.classList.add("active");
      observeStage();
      return featured;
    }

    function makeRow(item, index, query) {
      const st = STATUS_CONFIG[item.status] || { label: "Ismeretlen", chipClass: "" };
      const es = EVENT_STATUS_CONFIG[item.eventStatus] || { label: "Hamarosan", chipClass: "event-hamarosan" };
      const listImg = getListImage(item);
      const fitMode = item.listImageFit || (item.listImage && item.listImage.toLowerCase().includes("logo") ? "contain" : "cover");
      const isLogo = !(item.listImage || (item.images && item.images[0]));
      const lastUpdate = getLastUpdate(item) ? formatDate(getLastUpdate(item)) : "Ismeretlen";

      return `
        <article class="list-item ${item.type === "projekt" ? `status-${st.chipClass}-row` : ""}" style="animation-delay:${index * 0.03}s">
          <img
            class="mini-image ${isLogo ? "is-logo" : ""} ${fitMode === "contain" ? "fit-contain" : ""}"
            src="${listImg}"
            alt="${escapeHtml(item.title)}"
            onerror="this.onerror=null;this.src='${fallbackListImage}';this.classList.add('is-logo','fit-contain');"
          >
          <div>
            <h3 class="item-title">${highlightText(item.title, query)}</h3>
            <p class="item-meta">
              ${item.type === "esemeny" ? escapeHtml(item.eventDateText || "Pontos időpont bejelentés alatt") : escapeHtml(formatDate(item.date))}
              | Írta: ${escapeHtml(item.author)} | ${escapeHtml(item.investor)}
            </p>
            <div class="chips">
              ${item.type === "projekt" ? `<span class="chip ${st.chipClass}">${st.label}</span>` : ""}
              ${item.type === "projekt" ? `<span class="chip">Készültség: ${item.progress ?? 0}%</span>` : ""}
              ${item.type === "esemeny" ? `<span class="chip ${es.chipClass}">${es.label}</span>` : ""}
              <span class="chip">${escapeHtml(item.category)}</span>
              <span class="chip">Utoljára frissítve: ${escapeHtml(lastUpdate)}</span>
            </div>
          </div>
          <button class="open-btn" data-open="${escapeHtml(item.id)}">Részletek</button>
        </article>
      `;
    }

    function renderProjectGroups(data, query) {
      let rowIndex = 0;
      const html = STATUS_GROUPS.map(group => {
        const list = data.filter(i => i.status === group.key);
        if (!list.length) return "";
        return `
          <section class="status-group status-${group.key}">
            <div class="status-head">
              <span>${group.title}</span>
              <span class="count">${list.length} db</span>
            </div>
            ${list.map(item => makeRow(item, rowIndex++, query)).join("")}
          </section>
        `;
      }).join("");
      feedEl.innerHTML = html;
    }

    function renderFeed() {
      const data = getFiltered();
      const query = searchEl.value.trim();

      renderStats(data);

      let featuredId = null;
      if (activeType === "esemeny") {
        const featured = renderFeaturedEvent(data);
        featuredId = featured ? featured.id : null;
      } else {
        featuredWrap.classList.remove("active");
        featuredWrap.innerHTML = "";
      }

      const listData = featuredId ? data.filter(item => item.id !== featuredId) : data;

      if (!listData.length) {
        feedEl.innerHTML = "";
        emptyEl.hidden = false;
        emptyEl.innerHTML = "<h3>Nincs találat</h3><p>Próbálj más keresést vagy kategóriát.</p>";
        return;
      }

      emptyEl.hidden = true;

      if (activeType === "projekt") {
        renderProjectGroups(listData, query);
      } else {
        feedEl.innerHTML = listData.map((item, i) => makeRow(item, i, query)).join("");
      }
    }

    function renderDetail(itemId) {
      const item = items.find(x => x.id === itemId);
      if (!item) return;

      lastOpenedId = item.id;
      const statusLabel = item.type === "projekt"
        ? (STATUS_CONFIG[item.status]?.label || "Nincs")
        : item.type === "esemeny"
          ? (EVENT_STATUS_CONFIG[item.eventStatus]?.label || "Hamarosan")
          : "";

      const current = item.images[galleryIndex[item.id]] || item.images[0] || fallbackListImage;
      const multiImage = item.images && item.images.length > 1;

      detailPanel.innerHTML = `
        <div class="panel-top">
          <div>
            <h3 class="panel-title">${escapeHtml(item.title)}</h3>
            <p class="panel-meta">
              ${item.type === "esemeny" ? escapeHtml(item.eventDateText || "Pontos időpont bejelentés alatt") : escapeHtml(formatDate(item.date))}
              | Írta: ${escapeHtml(item.author)} | Befektető/frakció: ${escapeHtml(item.investor)}
            </p>
          </div>
          <div class="panel-actions">
            <button class="share-btn" id="copyLinkBtn" aria-label="Link másolása">⎘</button>
            <button class="close-panel" id="closeDetail" aria-label="Bezárás">×</button>
          </div>
        </div>

        <p class="panel-desc">${escapeHtml(item.description)}</p>

        ${item.type === "projekt" ? `
          <div class="progress-wrap">
            <div class="progress-text">Készültség: ${item.progress ?? 0}% | Állapot: ${statusLabel}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${item.progress ?? 0}%"></div></div>
          </div>
        ` : ""}

        ${item.type === "esemeny" ? `
          <div class="chips" style="margin:0 0 12px 0;">
            <span class="chip ${(EVENT_STATUS_CONFIG[item.eventStatus] || EVENT_STATUS_CONFIG["hamarosan"]).chipClass}">${statusLabel}</span>
            <span class="chip">${escapeHtml(item.eventDateText || "Pontos időpont bejelentés alatt")}</span>
            <span class="chip">${escapeHtml(item.venue || "Helyszín: hamarosan")}</span>
            <span class="chip">${escapeHtml(item.category)}</span>
            ${(item.tags || []).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("")}
          </div>
        ` : ""}

        <div class="gallery-main-wrap" data-open-lightbox="${escapeHtml(current)}">
          <img class="gallery-main" src="${escapeHtml(current)}" alt="${escapeHtml(item.title)}" onerror="this.onerror=null;this.src='${fallbackListImage}';">
          ${multiImage ? `
            <div class="gallery-nav">
              <button class="gallery-btn" data-gallery="prev" data-id="${escapeHtml(item.id)}" aria-label="Előző kép"><</button>
              <button class="gallery-btn" data-gallery="next" data-id="${escapeHtml(item.id)}" aria-label="Következő kép">></button>
            </div>
          ` : ""}
        </div>

        ${multiImage ? `
          <div class="thumbs">
            ${item.images.map((src, idx) => `
              <button class="thumb ${galleryIndex[item.id] === idx ? "active" : ""}" data-gallery="thumb" data-id="${escapeHtml(item.id)}" data-index="${idx}" aria-label="Kép ${idx + 1}">
                <img src="${escapeHtml(src)}" alt="${escapeHtml(item.title)} ${idx + 1}" onerror="this.onerror=null;this.src='${fallbackListImage}';">
              </button>
            `).join("")}
          </div>
        ` : ""}

        <details class="history">
          <summary>Frissítési history</summary>
          <ul class="history-list">
            ${(item.history || []).map(h => `<li><strong>${escapeHtml(formatDate(h.date))}</strong> - ${escapeHtml(h.text)}</li>`).join("")}
          </ul>
        </details>
      `;

      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      window.location.hash = item.id;

      const copyBtn = document.getElementById("copyLinkBtn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          const shareUrl = `${window.location.origin}${window.location.pathname}#${item.id}`;
          try {
            await navigator.clipboard.writeText(shareUrl);
            copyBtn.textContent = "✓";
            setTimeout(() => { copyBtn.textContent = "⎘"; }, 1200);
          } catch (_) {
            alert("A link másolása nem sikerült.");
          }
        });
      }
    }

    function closeDetail() {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
      detailPanel.innerHTML = "";
      document.body.style.overflow = "";
      if (window.location.hash) history.replaceState(null, "", window.location.pathname);
    }

    function stepGallery(id, dir) {
      const item = items.find(x => x.id === id);
      if (!item || !item.images || item.images.length < 2) return;
      galleryIndex[id] = (galleryIndex[id] + dir + item.images.length) % item.images.length;
      renderDetail(id);
    }

    function openLightbox(src) {
      lightboxImg.src = src || fallbackListImage;
      lightbox.classList.add("active");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImg.src = "";
    }

    feedEl.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-open]");
      if (btn) renderDetail(btn.dataset.open);
    });

    featuredWrap.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-open]");
      if (btn) renderDetail(btn.dataset.open);
    });

    detailPanel.addEventListener("click", (e) => {
      if (e.target.id === "closeDetail") {
        closeDetail();
        return;
      }

      const lightboxTarget = e.target.closest("[data-open-lightbox]");
      if (lightboxTarget) {
        openLightbox(lightboxTarget.dataset.openLightbox);
        return;
      }

      const g = e.target.closest("[data-gallery]");
      if (!g) return;

      const id = g.dataset.id;
      if (g.dataset.gallery === "prev") stepGallery(id, -1);
      if (g.dataset.gallery === "next") stepGallery(id, 1);
      if (g.dataset.gallery === "thumb") {
        galleryIndex[id] = Number(g.dataset.index);
        renderDetail(id);
      }
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeDetail();
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    lightboxClose.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (lightbox.classList.contains("active")) closeLightbox();
        else if (modal.classList.contains("active")) closeDetail();
      }

      if (modal.classList.contains("active") && lastOpenedId) {
        if (e.key === "ArrowLeft") stepGallery(lastOpenedId, -1);
        if (e.key === "ArrowRight") stepGallery(lastOpenedId, 1);
      }
    });

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeType = btn.dataset.type;
        activeOnlyWrap.style.display = activeType === "projekt" ? "inline-flex" : "none";
        renderCategoryOptions();
        renderFeed();
      });
    });

    searchEl.addEventListener("input", renderFeed);
    categoryFilter.addEventListener("change", renderFeed);
    activeOnly.addEventListener("change", renderFeed);

    window.addEventListener("load", async () => {
      activeOnlyWrap.style.display = "inline-flex";
      await loadItemsFromJson();

      const hashId = window.location.hash.replace("#", "");
      if (hashId && items.some(i => i.id === hashId)) {
        const target = items.find(i => i.id === hashId);
        activeType = target.type;
        tabs.forEach(b => b.classList.toggle("active", b.dataset.type === activeType));
        activeOnlyWrap.style.display = activeType === "projekt" ? "inline-flex" : "none";
        renderCategoryOptions();
        renderFeed();
        setTimeout(() => renderDetail(hashId), 180);
      }
    });
  </script>
</body>
</html>
