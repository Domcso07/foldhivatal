<script>
async function loadDoc() {
  const url = "https://docs.google.com/document/d/1h6zRSCONM5gumVXw69_-tay_LnFFSfqNwbDfzCGJSjc/export?format=html";
  const target = document.getElementById("doc-content");

  target.innerHTML = "Betoltes...";

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP hiba: " + res.status);

    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    let content = doc.body.innerHTML;
    content = content.replace(/<p[^>]*class="[^"]*title[^"]*"[^>]*>[\s\S]*?1\. lap[\s\S]*?<\/p>/gi, "");

    target.innerHTML = content || "Nincs megjelenitheto tartalom.";
  } catch (err) {
    console.error(err);
    target.innerHTML = "<p>Betoltes sikertelen. Probald ujra kesobb.</p>";
  }
}

loadDoc();

</script>
